services:
  lerevently.api:
    image: ${DOCKER_REGISTRY-}lereventlyapi
    container_name: Lerevently.Api
    build:
      context: .
      dockerfile: Lerevently.Api/Dockerfile

    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
    ports:
      - 5000:8080
      - 5001:8081
    depends_on:
      lerevently.db:
        condition: service_healthy
        
      lerevently.seq:
        condition: service_started
        
      lerevently.redis:
        condition: service_started
            
      lerevently.identity:
        condition: service_started
      
    restart: always


  lerevently.identity:
    image: keycloak/keycloak:26.4
    container_name: Lerevently.Identity
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=admin
      - KEYCLOAK_IMPORT=/tmp/lerevently-realm-export.json

      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://lerevently.db:5432/lereventlydb_docker
      - KC_DB_USERNAME=postgres
      - KC_DB_PASSWORD=postgres
    volumes:
      - ./.containers/identity:/opt/jboss/keycloak/standalone/data
    #      - ./.files/filoshop-realm-export.json:/opt/keycloak/data/import/realm.json
    depends_on:
      lerevently.db:
        condition: service_healthy
    ports:
      - "8001:8080"  # <-- 3. FIXED: Internal port is 8080
    command: start-dev


  lerevently.db:
    image: postgres:18.0
    container_name: Lerevently.Db
    environment:
      - POSTGRES_DB=lereventlydb_docker
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - ./.containers/db:/var/lib/postgresql
    ports:
      - 5433:5432
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d lereventlydb_docker" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
        
  lerevently.seq:
    image: datalust/seq:2025.2
    container_name: Lerevently.Seq
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_NOAUTHENTICATION=True
    ports:
      - 5341:5341
      - 8080:80
    restart: always
    
    
  lerevently.redis:
    image: redis:8.4.0
    container_name: Lerevently.Redis
    restart: always
    ports:
      - "6379:6379"
