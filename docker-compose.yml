services:
  lerevently.api:
    image: ${DOCKER_REGISTRY-}lereventlyapi
    container_name: Lerevently.Api
    build:
      context: .
      dockerfile: Lerevently.Api/Dockerfile

    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - 5000:8080
      - 5001:8081
    depends_on:
      lerevently.db:
        condition: service_healthy
        
      lerevently.seq:
        condition: service_started
        
      lerevently.redis:
        condition: service_started
            

    restart: always


  lerevently.db:
    image: postgres:18.0
    container_name: Lerevently.Db
    environment:
      - POSTGRES_DB=lereventlydb_docker
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - ./.containers/db:/var/lib/postgresql
    ports:
      - 5433:5432
        
  lerevently.seq:
    image: datalust/seq:2025.2
    container_name: Lerevently.Seq
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_NOAUTHENTICATION=True
    ports:
      - 5341:5341
      - 8080:80
    restart: always
    
    
  lerevently.redis:
    image: redis:8.4.0
    container_name: Lerevently.Redis
    restart: always
    ports:
      - "6379:6379"